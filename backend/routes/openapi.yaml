openapi: 3.0.3
info:
  title: IEEE Conference Backend API
  version: 1.0.0
  description: |
    Drogon C++ backend API.

    Response envelope:
    - Success: { success: true, message: string, data?: any }
    - Error:   { success: false, message: string }
servers:
  - url: http://localhost:3000
    description: Local default (PORT env var; defaults to 3000)

tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Notifications
  - name: Gallery

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessNoData'
              examples:
                ok:
                  value:
                    success: true
                    message: heathy

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              example:
                value:
                  email: user@example.com
                  password: secret
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Validation error / invalid password / invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/signup:
    post:
      tags: [Auth]
      summary: Signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Signup successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupResponse'
        '400':
          description: Validation error / email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to create user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/firebase/login:
    post:
      tags: [Auth]
      summary: Firebase login
      description: |
        Logs in a Firebase-authenticated user.
        The backend expects an `idToken` from Firebase in the `token` field.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FirebaseAuthRequest'
            examples:
              example:
                value:
                  token: eyJhbGciOi...
      responses:
        '200':
          description: Firebase login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Validation error / invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid Firebase token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/firebase/signup:
    post:
      tags: [Auth]
      summary: Firebase signup
      description: |
        Creates a user using Firebase identity.
        The backend expects an `idToken` from Firebase in the `token` field.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FirebaseAuthRequest'
            examples:
              example:
                value:
                  token: eyJhbGciOi...
      responses:
        '201':
          description: Firebase signup successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirebaseSignupResponse'
        '400':
          description: Validation error / user already exists / invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid Firebase token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to create user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users:
    get:
      tags: [Users]
      summary: List users
      description: |
        Returns a paginated list (admin only).

        Note: current implementation rejects `limit >= 20`.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 19
            default: 10
      responses:
        '200':
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersListResponse'
        '401':
          description: Unauthorized (missing/invalid token or not an admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid request / invalid limit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Users]
      summary: Update current user (from JWT)
      description: |
        Requires Bearer token. The backend reads `userId` from the JWT and updates that user.

        Note: although the backend accepts `role` in the payload, there is no explicit role authorization in this handler.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
            examples:
              example:
                value:
                  name: New Name
                  password: newPassword
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessNoData'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to update user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/profile:
    get:
      tags: [Users]
      summary: Get user by id
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: User retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserResponse'
        '400':
          description: Missing id / invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/{id}:
    delete:
      tags: [Users]
      summary: Delete user by id
      description: Admin only.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: User deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessNoData'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found or already deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/makeAdmin:
    post:
      tags: [Users]
      summary: Promote current user to admin
      description: |
        Admin only.

        As implemented, this endpoint promotes the *current JWT user* (from `AuthFilter`) to role `admin`.
        It does not accept a target user id.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Role updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessNoData'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found or failed to update role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/gallery/images:
    get:
      tags: [Gallery]
      summary: List galleries
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            default: 10
      responses:
        '200':
          description: Galleries fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GalleryListResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/gallery/image/{id}:
    get:
      tags: [Gallery]
      summary: Get gallery by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Gallery fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GalleryGetResponse'
        '404':
          description: Gallery not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Gallery]
      summary: Delete gallery image by id
      description: Admin only.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Gallery deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessNoData'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Gallery not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/gallery/image/signed-url:
    post:
      tags: [Gallery]
      summary: Generate pre-signed upload URL for a gallery image
      description: Admin only.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GallerySignedUrlRequest'
      responses:
        '200':
          description: Image signed Url generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GallerySignedUrlResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/gallery/image:
    post:
      tags: [Gallery]
      summary: Create a gallery entry
      description: Admin only.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GalleryCreateRequest'
      responses:
        '200':
          description: Gallery created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GalleryCreateResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to create gallery
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/uploadProfilePicture:
    post:
      tags: [Users]
      summary: Generate pre-signed S3 upload URL for profile picture
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadProfilePictureRequest'
            examples:
              example:
                value:
                  file_extension: png
      responses:
        '200':
          description: Upload URL generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadProfilePictureResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/notifications:
    get:
      tags: [Notifications]
      summary: List notifications
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            default: 10
        - in: query
          name: type
          description: Notification type
          schema:
            type: string
            enum: [HIGHLIGHTS, RECENT_UPDATES]
            default: RECENT_UPDATES
      responses:
        '200':
          description: Notifications retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationsListResponse'
        '404':
          description: Invalid notification type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags: [Notifications]
      summary: Create notification
      description: Admin only.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNotificationRequest'
      responses:
        '201':
          description: Notification created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateNotificationResponse'
        '400':
          description: Missing required fields / invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to create notification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/notifications/{id}:
    get:
      tags: [Notifications]
      summary: Get notification by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Notification retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetNotificationResponse'
        '404':
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags: [Notifications]
      summary: Update notification
      description: Admin only.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNotificationRequest'
      responses:
        '200':
          description: Notification updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessNoData'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to update notification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Notifications]
      summary: Delete notification
      description: Admin only.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Notification deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessNoData'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to delete notification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SuccessNoData:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string

    ErrorResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    SignupRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    FirebaseAuthRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: Firebase ID token

    AuthUserData:
      type: object
      required: [token, user_id, name, email]
      properties:
        token:
          type: string
          description: JWT token
        user_id:
          type: integer
        name:
          type: string
        email:
          type: string

    LoginResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Login successful
        data:
          $ref: '#/components/schemas/AuthUserData'

    SignupResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Signup successful
        data:
          $ref: '#/components/schemas/AuthUserData'

    FirebaseSignupData:
      type: object
      required: [token, user_id, email]
      properties:
        token:
          type: string
          description: JWT token
        user_id:
          type: integer
        email:
          type: string
          format: email

    FirebaseSignupResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Firebase signup successful
        data:
          $ref: '#/components/schemas/FirebaseSignupData'

    UserPublic:
      type: object
      required: [id, name, email, role]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string

    UsersListResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserPublic'

    GetUserResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          $ref: '#/components/schemas/UserPublic'

    UpdateUserRequest:
      type: object
      description: All fields are optional; send only what you want to update.
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        role:
          type: string
        profilePicture:
          type: string
          description: Profile picture URL (if you store it client-side); not used in the upload URL endpoint.

    UploadProfilePictureRequest:
      type: object
      required: [file_extension]
      properties:
        file_extension:
          type: string
          description: File extension without dot (e.g. png, jpg)
          example: png

    UploadProfilePictureData:
      type: object
      required: [upload_url]
      properties:
        upload_url:
          type: string
          format: uri
          description: Pre-signed HTTP PUT URL to upload the file

    UploadProfilePictureResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          $ref: '#/components/schemas/UploadProfilePictureData'

    Notification:
      type: object
      required: [id, title, description, type, link, priority, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [HIGHLIGHTS, RECENT_UPDATES]
        link:
          type: string
        priority:
          type: integer
        createdAt:
          type: string
          description: Stored as string by backend

    NotificationsListResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/Notification'

    GetNotificationResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          $ref: '#/components/schemas/Notification'

    CreateNotificationRequest:
      type: object
      required: [title, description, type, link, priority]
      properties:
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [HIGHLIGHTS, RECENT_UPDATES]
        link:
          type: string
        priority:
          type: integer

    CreateNotificationResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: integer
          description: Newly created notification id

    UpdateNotificationRequest:
      type: object
      description: All fields are optional; send only what you want to update.
      properties:
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [HIGHLIGHTS, RECENT_UPDATES]
        link:
          type: string
        priority:
          type: integer

    GalleryItem:
      type: object
      required: [id, title, tags, imageUrl]
      properties:
        id:
          type: integer
        title:
          type: string
        tags:
          type: array
          items:
            type: string
        imageUrl:
          type: string
          description: Public URL or CDN URL returned by backend

    GalleryItemWithCreatedAt:
      allOf:
        - $ref: '#/components/schemas/GalleryItem'
        - type: object
          required: [createdAt]
          properties:
            createdAt:
              type: string
              description: Stored as string by backend

    GalleryListResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/GalleryItem'

    GalleryGetResponse:
      type: object
      required: [success, message, data]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          $ref: '#/components/schemas/GalleryItemWithCreatedAt'

    GallerySignedUrlRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
