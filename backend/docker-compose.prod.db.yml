services:
  db:
    image: postgres:15.3-alpine
    container_name: postgres
    restart: always
    env_file:
      - db.env
    ports:
      - "5432:5432"
    volumes:
      - ~/db_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - conference_network

networks:
  conference_network:
    driver: bridge